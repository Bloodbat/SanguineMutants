name: Build and Upload Sanguine Mutants Nightly
#on: [push, pull_request]

on:
  workflow_dispatch:
  schedule:
    # It's always night... somewhere
    #        +--------------- minute (0 - 59)
    #        ¦  +------------ hour (0 - 23)
    #        ¦  ¦  +--------- day of the month (1 - 31)
    #        ¦  ¦  ¦ +------- month (1 - 12 or JAN-DEC)
    #        ¦  ¦  ¦ ¦ +----- day of the week (0 - 6 or SUN-SAT)
    - cron: "46 18 * * *" # Every day at 18:46 UTC

env:
  rack-sdk-version: 2.6.6
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

jobs:
  modify-plugin-version:
    name: Modify plugin version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: mutantsdev
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}
      - run: |
          gitrev=`git rev-parse --short HEAD`
          pluginversion=`jq -r '.version' plugin.json`
          echo "Set plugin version from $pluginversion to $pluginversion-$gitrev"
          cat <<< `jq --arg VERSION "$pluginversion-$gitrev-nightly" '.version=$VERSION' plugin.json` > plugin.json

  build:
    name: ${{ matrix.platform }}
    needs: modify-plugin-version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bloodbat/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      matrix:
        platform: [win-x64, lin-x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
          ref: mutantsdev
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}
      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-${{ matrix.platform }}
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build
          name: ${{ matrix.platform }}

  build-mac:
    name: mac
    needs: modify-plugin-version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
          ref: mutantsdev
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}
      - name: Get Rack-SDK
        run: |
          pushd $HOME
          wget -O Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-mac-${{ matrix.platform }}.zip
          unzip Rack-SDK.zip
      - name: Build plugin
        run: |
          CROSS_COMPILE_TARGET_x64=x86_64-apple-darwin
          CROSS_COMPILE_TARGET_arm64=arm64-apple-darwin
          export RACK_DIR=$HOME/Rack-SDK
          export CROSS_COMPILE=$CROSS_COMPILE_TARGET_${{ matrix.platform }}
          make dep
          make dist
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: dist/*.vcvplugin
          name: mac-${{ matrix.platform }}

  publish-nightly:
    name: Publish Nightly
    #if: ${{ github.ref == 'refs/heads/mutantsdev' && github.repository_owner == 'Bloodbat' }}
    if: ${{ github.repository_owner == 'Bloodbat' }}
    runs-on: ubuntu-latest
    needs: [build, build-mac]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: _artifacts
      - name: Delete old release assets
        uses: andreaswilli/delete-release-assets-action@cee1e4ece007d910b3555134b0c8109687469ec3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: Nightly
          deleteOnlyFromDrafts: false
      - name: Upload release assets
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: _artifacts/**/*.vcvplugin
          tag: Nightly
          file_glob: true
